<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
      min-height: 100vh;
      padding: 30px;
    }

    .container{
      max-width: 1000px;
      margin: auto;
    }

    .profile-card{
      background-color: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }

    .profile-card img{
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .profile-card h1{
      font-size: 32px;
      margin-bottom: 10px;
    }

    .profile-card p{
      color: #ddd;
      font-size: 18px;
    }

    .section{
      margin-bottom: 35px;
    }

    .section h2{
      margin-bottom: 20px;
      font-size: 24px;
      border-left: 6px solid #ffd700;
      padding-left: 12px;
    }

    .movies{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .movie-card{
      background-color: rgba(255,255,255,0.08);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
      transition: transform 0.3s;
      text-align: center;
      padding-bottom: 15px;
    }

    .movie-card:hover{
      transform: translateY(-8px);
    }

    .movie-card img{
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .movie-card h3{
      margin-top: 12px;
      font-size: 20px;
    }

    .movie-card p{
      color: #ccc;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="profile-card">
    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Amna" alt="profile">     <h1>Amna</h1>
      <p>user@email.com</p>
    </div>

    <div class="section">
      <h2>⭐️ Favorite Movies</h2>
      <div class="movies">
        <div class="movie-card">
          <img src="https://image.tmdb.org/t/p/w500/6CoRTJTmijhBLJTUNoVSUNxZMEI.jpg">            <h3>Film 1</h3>
          <p>My favorite movie</p>
        </div>

        <div class="movie-card">
          <img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">          <h3>Film 2</h3>
          <p>Action and adventure movies</p>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>🕒 Last Watching</h2>
      <div class="movies">
        <div class="movie-card">
          <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
          <h3>Film 3</h3>
          <p>Recently watched</p>
        </div>

        <div class="movie-card">
         <img src="https://image.tmdb.org/t/p/w500/r7vmZjiyZw9rpJMQJdXpjgiCOk9.jpg">
          <h3>Film 4</h3>
          <p>Interesting story movies</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
