<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details | MovieZone</title>
    <link rel="stylesheet" href="moviezone.css">
    <style>
        :root {
            --primary-color: #e50914;
            --bg-dark: #000;
            --text-light: #fff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Main Movie Hero Section */
        .movie-hero {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            padding: 40px;
            gap: 60px;
            flex-wrap: wrap;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), var(--bg-dark)), url('Images/Inception.webp');
            background-size: cover;
            background-position: center;
        }

        .poster-wrapper {
            transition: transform 0.4s ease;
        }

        .main-poster {
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .movie-content {
            max-width: 600px;
        }

        .movie-title {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
        }

        .stats {
            margin: 15px 0;
            display: flex;
            gap: 15px;
            color: #ccc;
        }

        .badge {
            background: var(--primary-color);
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .description {
            line-height: 1.6;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn-play {
            background: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 15px;
        }

        .btn-fav {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 12px 30px;
            border: 1px solid white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Suggestions Section */
        .suggestions {
            padding: 50px 8%;
        }

        .suggestions h2 {
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
            margin-bottom: 30px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .movie-card {
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .movie-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            background: linear-gradient(transparent, black);
            width: 100%;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <main class="movie-hero" id="mainHero">
        <div class="poster-wrapper">
            <img src="Images/Avengers.webp" id="mainImg" class="main-poster">
        </div>
        <div class="movie-content">
            <h1 class="movie-title" id="mainTitle">Avengers</h1>
            <div class="stats">
                <span class="badge">Trending</span>
                <span id="mainYear">2026</span> • <span id="mainDuration">3h 02m</span>
            </div>
            <p class="description" id="mainDesc">
                Earth's mightiest heroes assemble once more for an epic showdown against a threat that endangers the entire multiverse.
            </p>
            <div class="action-btns">
                <button class="btn-play">▶ Play Now</button>
                <button id="favBtn" class="btn-fav">❤ Favorites</button>
            </div>
        </div>
    </main>

    <section class="suggestions">
        <h2>More Like This</h2>
        <div class="movies-grid">
            <div class="movie-card" onclick="changeMovie('Titanic', '1997', '3h 14m', 'A seventeen-year-old aristocrat falls in love with a kind but poor artist aboard the luxurious, ill-fated R.M.S. Titanic.', 'Images/Titanic.webp')">
                <img src="Images/Titanic.webp">
                <div class="card-info">Titanic</div>
            </div>
            <div class="movie-card" onclick="changeMovie('Inception', '2010', '2h 28m', 'A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task.', 'Images/Inception.webp')">
                <img src="Images/Inception.webp">
                <div class="card-info">Inception</div>
            </div>
            <div class="movie-card" onclick="changeMovie('Interstellar', '2014', '2h 49m', 'A team of explorers travel through a wormhole in space in an attempt to ensure humanity\'s survival.', 'Images/Interstellar.webp')">
                <img src="Images/Interstellar.webp">
                <div class="card-info">Interstellar</div>
            </div>
            <div class="movie-card" onclick="changeMovie('Joker', '2019', '2h 02m', 'In Gotham City, mentally troubled comedian Arthur Fleck is disregarded and mistreated by society.', 'Images/Joker.jpg')">
                <img src="Images/Joker.jpg">
                <div class="card-info">Joker</div>
            </div>
            <div class="movie-card" onclick="changeMovie('Frozen', '2013', '1h 42m', 'When the newly-crowned Queen Elsa accidentally uses her power to turn things into ice, her sister Anna teams up to save their kingdom.', 'Images/Frozen.webp')">
                <img src="Images/Frozen.webp">
                <div class="card-info">Frozen</div>
            </div>
        </div>
    </section>

    <script src="moviezone.js"></script>

    <script>
        // Function to change the main movie dynamically
        function changeMovie(title, year, duration, desc, imgPath) {
            document.getElementById('mainTitle').innerText = title;
            document.getElementById('mainYear').innerText = year;
            document.getElementById('mainDuration').innerText = duration;
            document.getElementById('mainDesc').innerText = desc;
            document.getElementById('mainImg').src = imgPath;
            
            // Scroll back to top smoothly
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Favorites interaction
        document.getElementById('favBtn').onclick = function() {
            this.innerHTML = "❤️ Added!";
            this.style.background = "#fff";
            this.style.color = "#000";
            alert("Added to your watchlist!");
        };
    </script>
</body>
</html>
