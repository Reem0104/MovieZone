<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | MovieZone</title>
    <link rel="stylesheet" href="moviezone.css">
</head>
<body class="bg-dark">

    <nav class="navbar">
        <div class="navbarlogo">MOVIE<span>ZONE</span></div>
    </nav>

    <main class="hero" style="justify-content: center; align-items: center;">
        <div class="herooverlay"></div> 
        
        <div class="profile-card" style="max-width: 400px; z-index: 10; background: rgba(20,20,20,0.9); border: 1px solid var(--border-subtle);">
            <h1 class="page-headertitle" style="text-align: center; margin-bottom: 2rem;">Log in </h1>
            
            <form id="loginForm">
                <div class="search-bar" style="margin-bottom: 1rem; width: 100%;">
                    <input type="text" id="username" class="search-barinput" placeholder="username " required>
                </div>
                
                <div class="search-bar" style="margin-bottom: 1.5rem; width: 100%;">
                    <input type="password" id="password" class="search-bar__input" placeholder="password" required>
                     </div>
                
                <button type="submit" class="btn btn--red" style="width: 100%; justify-content: center;">
                    Login 
                </button>
            </form>

            <div id="message" class="mt-2 text-red" style="text-align: center; min-height: 24px;"></div>
        </div>
    </main>

    <script src="moviezone.js"></script>
</body>
</html>
